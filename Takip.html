<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatim Takip Listesi</title>
<style>
  :root{
    --bg:#0b1020;--bg2:#0f1830;--card:#1a2238;--card-hover:#212c47;
    --text:#e8edf7;--muted:#9aa7c2;--blue:#3b82f6;--yellow:#f5c518;
    --green:#16a34a;--green-l:#22c55e;--green-bg:#0f2a1a;--line:#26314e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#13203f 0%,var(--bg) 55%);
    color:var(--text);min-height:100vh;padding:24px 16px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  header{text-align:center;padding:10px 0 4px;}
  h1{margin:0;font-size:clamp(24px,4vw,38px);font-weight:800;letter-spacing:.5px;color:#5b9dff;}
  .warn{margin:10px 0 0;color:var(--yellow);font-size:13.5px;font-weight:600;}
  .divider{height:1px;background:var(--line);margin:18px 0 24px;}

  /* hatim bölümü */
  .hatim-section{margin-bottom:38px;}
  .sec-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line);
  }
  .sec-title{font-size:21px;font-weight:800;color:#5b9dff;letter-spacing:.5px;}
  .sec-date{font-size:13px;color:var(--muted);}
  .sec-date b{color:#ff6b6b;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 24px;}
  @media(max-width:880px){.grid{grid-template-columns:1fr;}}

  .row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;cursor:pointer;user-select:none;
    transition:background .15s ease,border-color .15s ease,transform .08s ease;
  }
  .row:hover{background:var(--card-hover);}
  .row:active{transform:scale(.99);}
  .name{font-size:16px;font-weight:700;letter-spacing:.3px;}
  .badge{
    flex:none;min-width:46px;text-align:center;font-weight:800;font-size:15px;color:#fff;
    background:var(--blue);border-radius:8px;padding:6px 10px;
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
  }
  .badge.secde{background:var(--yellow);color:#1c1606;}
  .secde-icon{font-size:13px;line-height:1;}
  .row.done{background:var(--green-bg);border-color:#1f6b3a;}
  .row.done:hover{background:#123421;}
  .row.done .name{color:var(--green-l);}
  .row.done .badge{background:var(--green) !important;color:#fff !important;}
  .check{
    flex:none;width:24px;height:24px;border-radius:50%;border:2px solid #3a4666;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:14px;color:transparent;transition:all .15s ease;
  }
  .row.done .check{background:var(--green-l);border-color:var(--green-l);color:#fff;}
  .left{display:flex;align-items:center;gap:12px;min-width:0;}
  .badge-okundu{
    display:none;font-size:11px;font-weight:700;color:var(--green-l);
    background:rgba(34,197,94,.12);border:1px solid #1f6b3a;
    padding:2px 7px;border-radius:6px;margin-left:8px;white-space:nowrap;
  }
  .row.done .badge-okundu{display:inline-block;}

  /* kompakt özet */
  .mini{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .mini-row{display:flex;align-items:center;gap:14px;font-size:14px;font-weight:700;margin-bottom:10px;}
  .mini-read{color:var(--green-l);}
  .mini-left{color:#ff8a5b;}
  .mini-pct{margin-left:auto;color:var(--green-l);font-weight:800;}
  .bar{height:12px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .bar-fill{height:100%;width:0;background:linear-gradient(90deg,#16a34a,#22c55e);border-radius:999px;transition:width .4s ease;}

  /* kontroller */
  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .btn{border:1px solid var(--line);background:transparent;color:var(--muted);
    padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s ease;}
  .btn:hover{border-color:#5b9dff;color:#5b9dff;}
  .btn.add{background:#16233f;border-color:#2c4a7a;color:#9fc3ff;}
  .btn.add:hover{background:#1c2e52;border-color:#3b82f6;color:#cfe0ff;}
  .btn.reset:hover{border-color:#ff6b6b;color:#ff6b6b;}
  footer{text-align:center;color:#566080;font-size:12px;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>HATİM TAKİP LİSTESİ</h1>
    <p class="warn">⚠️ Sarı renkli cüzlerde Tilavet Secdesi bulunmaktadır. (19. ve 30. cüzlerde 2 adet secde vardır)</p>
  </header>
  <div class="divider"></div>

  <div id="app"></div>

  <footer>Bir cüzü "okundu" işaretlemek için karta dokunun. Her yeni hatimde okuyucuların cüzü bir ileri kayar. İşaretlemeler bu cihazda saklanır.</footer>
</div>

<script>
/* ---- İsimler (1. hatim sırası: ilk kişi 1. cüz, son kişi 30. cüz) ---- */
const names = [
  "BÜNYAMİN KILIÇ","MERYEM KILIÇ","HAFIZ HÜSEYİN KILIÇ","GÜLFİKAR KAYA","ZEYNEP KILIÇ ÇABUK",
  "RUKİYE ZENGÜL","NİGAR ÇAKIR","RECEP KAYA","EMİNE KILIÇ","SEYFULLAH KILIÇ",
  "ASİYE KILIÇ","YAHYA KILIÇ","ELİF KILIÇ","SAFURA TOK","FAHREDDİN KILIÇ",
  "ELMAS KILIÇ","FETULLAH KILIÇ","ABDURRAHMAN KILIÇ","HASAN KILIÇ","FATMA KILIÇ",
  "AYŞE KILIÇ","SEVDA DIŞIKITLI","GÜLSEN DEMİRDAŞ","LÜTFULLAH KILIÇ","GÜLSENEM KILIÇ",
  "AHMED KILIÇ","YUSUF KILIÇ","ZEYNEP KILIÇ","ZELİHA ÖZDEMİR","GÜLSÜM GÖZEK"
];

/* Secde olan cüzler (değer 2 = çift secde, ikon gösterilir) */
const SECDE = {9:1,13:1,14:1,15:1,16:1,17:1,19:2,21:1,27:1,30:2};

/* h. hatimde i. kişinin okuduğu cüz (+1 kayma, 30'u geçince başa döner) */
function cuzFor(i, h){ return ((i + (h - 1)) % 30) + 1; }

/* Son tarih: 1. hatim Perşembe 25.06.2026, her hatim +7 gün */
const BASE = new Date(2026, 5, 25, 18, 0);
const GUN = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
function hatimDate(h){
  const d = new Date(BASE.getTime());
  d.setDate(d.getDate() + (h - 1) * 7);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${GUN[d.getDay()]} ${dd}.${mm}.${d.getFullYear()}`;
}

/* ---- Durum (localStorage) ---- */
const KEY = "hatim_state_v2";
function load(){
  try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  // eski tek-hatim versiyonundan taşı
  const st = {hatimCount:1, done:{}};
  try{
    const old = JSON.parse(localStorage.getItem("hatim1_okunan"));
    if(old && typeof old === "object"){
      st.done["1"] = {};
      Object.keys(old).forEach(k=>{ if(old[k]) st.done["1"][k] = true; });
    }
  }catch(e){}
  return st;
}
let state = load();
function save(){
  window.__state = state;
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

function isDone(h,cuz){ return !!(state.done[h] && state.done[h][cuz]); }
function setDone(h,cuz,val){
  if(!state.done[h]) state.done[h] = {};
  if(val) state.done[h][cuz] = true; else delete state.done[h][cuz];
  save();
}
function countDone(h){
  const o = state.done[h] || {};
  return Object.keys(o).filter(k=>o[k]).length;
}

/* ---- Çizim ---- */
const app = document.getElementById('app');
let scrollTarget = null;

function sectionHTML(h){
  let rows = "";
  names.forEach((name,i)=>{
    const cuz = cuzFor(i,h);
    const sec = SECDE[cuz];
    const icon = sec === 2 ? `<span class="secde-icon" title="Tilavet Secdesi">۩</span>` : "";
    const done = isDone(h,cuz);
    rows += `<div class="row${done?' done':''}" data-h="${h}" data-cuz="${cuz}" role="button" tabindex="0">
        <div class="left"><span class="check">✓</span><span class="name">${name}</span><span class="badge-okundu">✓ Okundu</span></div>
        <span class="badge${sec?' secde':''}">${cuz}${icon}</span>
      </div>`;
  });
  const read = countDone(h), left = 30 - read, pct = Math.round(read/30*100);
  return `<section class="hatim-section" id="hatim-${h}">
    <div class="sec-head">
      <div class="sec-title">${h}. HATİM</div>
      <div class="sec-date">Son Tarih: <b>${hatimDate(h)}</b> · 18:00</div>
    </div>
    <div class="grid">${rows}</div>
    <div class="mini">
      <div class="mini-row"><span class="mini-read">${read} okundu</span><span class="mini-left">${left} kaldı</span><span class="mini-pct">%${pct}</span></div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
  </section>`;
}

function controlsHTML(){
  let h = `<div class="controls">`;
  h += `<button class="btn add" data-action="add">+ ${state.hatimCount+1}. Hatimi Aç</button>`;
  if(state.hatimCount > 1)
    h += `<button class="btn" data-action="remove">${state.hatimCount}. hatimi kaldır</button>`;
  h += `<button class="btn reset" data-action="reset">Tümünü sıfırla</button>`;
  return h + `</div>`;
}

function render(){
  let out = "";
  for(let h=1; h<=state.hatimCount; h++) out += sectionHTML(h);
  out += controlsHTML();
  app.innerHTML = out;
  if(scrollTarget){
    const el = document.getElementById('hatim-' + scrollTarget);
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    scrollTarget = null;
  }
}

/* ---- Etkileşim (delegasyon) ---- */
function toggle(h,cuz){ setDone(h,cuz,!isDone(h,cuz)); render(); }

app.addEventListener('click', e=>{
  const row = e.target.closest('.row');
  if(row){ toggle(+row.dataset.h, +row.dataset.cuz); return; }
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const a = btn.dataset.action;
  if(a === 'add'){
    state.hatimCount++; save(); scrollTarget = state.hatimCount; render();
  } else if(a === 'remove'){
    if(state.hatimCount > 1 && confirm(state.hatimCount + ". hatim kaldırılsın mı? İşaretleri silinecek.")){
      delete state.done[state.hatimCount]; state.hatimCount--; save(); render();
    }
  } else if(a === 'reset'){
    if(confirm("TÜM hatimler ve işaretler silinecek. Emin misiniz?")){
      state = {hatimCount:1, done:{}}; save(); render();
    }
  }
});
app.addEventListener('keydown', e=>{
  if(e.key === 'Enter' || e.key === ' '){
    const row = e.target.closest('.row');
    if(row){ e.preventDefault(); toggle(+row.dataset.h, +row.dataset.cuz); }
  }
});

render();
</script>
</body>
</html>
